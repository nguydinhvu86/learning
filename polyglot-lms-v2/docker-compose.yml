version: '3'
services:
  db:
    image: postgres:15-alpine
    container_name: polyglot-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: polyglot_lms
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: polyglot-redis
    ports:
      - '6379:6379'

volumes:
  pgdata:
